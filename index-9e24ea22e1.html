<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东方印象 - 中国文化旅行平台</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* 颜色方案 */
        :root {
            --primary-color: #c0392b;
            --secondary-color: #f39c12;
            --accent-color: #2c3e50;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
        }

        /* 导航栏 */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 2rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        /* 英雄区域 */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://s.coze.cn/image/EdzcQRv6MIg/');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            margin-top: 80px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 800px;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--secondary-color);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 1rem;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 特色区域 */
        .features {
            max-width: 1200px;
            margin: 0 auto;
            padding: 5rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-10px);
        }

        .feature-card h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        /* 文化展示 */
        .culture-showcase {
            background: var(--light-color);
            padding: 5rem 2rem;
        }

        .culture-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .culture-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .culture-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .culture-item h4 {
            padding: 1rem;
            color: var(--primary-color);
        }

        /* 页脚 */
        footer {
            background: var(--dark-color);
            color: white;
            text-align: center;
            padding: 2rem 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1.2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">东方印象</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#culture">文化探索</a></li>
                <li><a href="#travel">旅行规划</a></li>
                <li><a href="#services">服务预订</a></li>
                <li><a href="#about">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
        <h1>探索中国文化之美</h1>
        <p>发现千年传承的智慧与魅力，定制专属你的东方之旅</p>
        <div>
            <a href="#culture" class="cta-button">探索文化</a>
            <a href="#travel" class="cta-button">规划旅行</a>
        </div>
    </section>

    <section class="features">
        <div class="feature-card">
            <h3>文化认知</h3>
            <p>深入了解中国的非遗文化、传统节日、民俗风情和历史古迹，感受东方文明的独特魅力。</p>
        </div>
        <div class="feature-card">
            <h3>旅行规划</h3>
            <p>智能生成个性化旅行方案，根据你的兴趣和时间，定制专属的文化体验之旅。</p>
        </div>
        <div class="feature-card">
            <h3>落地执行</h3>
            <p>专业团队全程保障旅行体验，提供文化体验课程、私人定制旅行和专属导游服务。</p>
        </div>
    </section>

    <section class="culture-showcase" id="culture">
        <h2 style="text-align: center; margin-bottom: 3rem; color: var(--primary-color); font-size: 2.5rem;">中国文化瑰宝</h2>
        <div class="culture-grid">
            <div class="culture-item">
                <img src="https://s.coze.cn/image/EpHYOTdB1zY/" alt="非遗文化">
                <h4>非遗文化</h4>
            </div>
            <div class="culture-item">
                <img src="https://s.coze.cn/image/QNPhRrtneYI/" alt="传统节日">
                <h4>传统节日</h4>
            </div>
            <div class="culture-item">
                <img src="https://s.coze.cn/image/R0MvQ0oQ3uU/" alt="民俗风情">
                <h4>民俗风情</h4>
            </div>
            <div class="culture-item">
                <img src="https://s.coze.cn/image/7q_xiB931CE/" alt="历史古迹">
                <h4>历史古迹</h4>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 东方印象 - 中国文化旅行平台. 保留所有权利.</p>
    </footer>
</body>
</html>
